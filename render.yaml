services:
  - type: web
    name: api-server
    runtime: node
    region: oregon
    plan: free
    buildCommand: pip install -U yt-dlp && npm install -g pnpm@latest && pnpm install --frozen-lockfile && pnpm --filter @workspace/api-server run build
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
